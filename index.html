<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL PIBE DE LAS CAMISETAS</title>

<style>

body{
  font-family: Arial;
  margin:0;
  background:#f5f7fa;
}

header{
background:white;
padding:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.logo img{
height:60px;
}

/* MENU */

.menu{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-top:10px;
}

.menu button{
padding:8px 12px;
border:none;
border-radius:20px;
background:#eee;
cursor:pointer;
}

.menu .active{
background:black;
color:white;
}

/* BUSCADOR */

.buscador{
text-align:center;
margin:15px;
}

.buscador input{
padding:10px;
width:300px;
border-radius:10px;
border:1px solid #ccc;
}

/* ADMIN */

.adminBtn{
display:none;
margin-top:10px;
}

.adminVisible .adminBtn{
display:inline-block;
}

.panelAdmin{
display:none;
background:white;
padding:20px;
margin:20px;
border-radius:10px;
text-align:center;
}

/* CATALOGO */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
position:relative;
}

.producto img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:10px;
text-align:center;
}

/* BOTON BORRAR */

.deleteBtn{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
border:none;
border-radius:6px;
padding:5px;
display:none;
}

.adminVisible .deleteBtn{
display:block;
}

/* VISOR */

#visor{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

#visor img{
max-width:90%;
max-height:80%;
}

/* FLECHAS */

.galeriaBtns{
margin-top:20px;
display:flex;
gap:20px;
}

.galeriaBtns button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
</div>

<div class="menu">
<button data-cat="argentina" class="active">🇦🇷 Argentina</button>
<button data-cat="todas">Todas</button>
<button data-cat="seleccion">Selección Argentina</button>
<button data-cat="superliga">Superliga Argentina</button>
<button data-cat="laliga">La Liga</button>
<button data-cat="premier">Premier</button>
<button data-cat="seriea">Serie A</button>
<button data-cat="champions">Champions</button>
</div>

<div class="buscador">
<input id="buscador" placeholder="Buscar camiseta">
</div>

<button id="adminBtn" class="adminBtn">Admin</button>

</header>

<!-- PANEL ADMIN -->
<div id="panelAdmin" class="panelAdmin">

<h3>Subir camiseta</h3>

<input id="nombre" placeholder="Nombre"><br><br>

<select id="categoria">
<option value="seleccion">Selección Argentina</option>
<option value="superliga">Superliga Argentina</option>
<option value="laliga">La Liga</option>
<option value="premier">Premier</option>
<option value="seriea">Serie A</option>
<option value="champions">Champions</option>
</select><br><br>

<input type="file" id="imagenes" multiple><br><br>

<button id="addBtn">Añadir</button>
<button id="guardarBtn">Guardar</button>

</div>

<div id="catalogo" class="catalogo"></div>

<div id="visor">
<img id="visorImg">

<div class="galeriaBtns">
<button id="prevBtn">⬅</button>
<button id="nextBtn">➡</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const PASSWORD="1234";

const supabase=window.supabase.createClient(
"https://ycrphtitbjvtkhbartec.supabase.co",
"sb_publishable_dCPb6B5vx6ev5i9odbOVCA_aMw5nAi8"
);

let catalogo=[];
let filtro="argentina";
let admin=false;

/* GALERIA */
let fotosActuales=[];
let fotoIndex=0;

/* LOGIN */

document.addEventListener("keydown",(e)=>{
if(e.ctrlKey && e.shiftKey && e.key==="A"){
const pass=prompt("Password:");
if(pass===PASSWORD){
document.body.classList.add("adminVisible");
}
}
});

/* ABRIR PANEL ADMIN */

document.getElementById("adminBtn").onclick=()=>{
admin=!admin;
document.getElementById("panelAdmin").style.display=admin?"block":"none";
};

/* MENU */

document.querySelectorAll(".menu button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
filtro=btn.dataset.cat;
render();
};
});

/* AÑADIR */

document.getElementById("addBtn").onclick=()=>{

const nombre=document.getElementById("nombre").value;
const categoria=document.getElementById("categoria").value;
const files=[...document.getElementById("imagenes").files];

if(!nombre||files.length===0){
alert("Faltan datos");
return;
}

const nueva={nombre,categoria,imagenes:[]};

catalogo.push(nueva);

let cargadas=0;

files.forEach(file=>{
const reader=new FileReader();

reader.onload=e=>{
nueva.imagenes.push(e.target.result);
cargadas++;

if(cargadas===files.length)render();
};

reader.readAsDataURL(file);

});

};

/* GUARDAR */

document.getElementById("guardarBtn").onclick=async()=>{

for(const c of catalogo){

if(c.id) continue;

const {data,error}=await supabase
.from("camisetas")
.insert({
nombre:c.nombre,
categoria:c.categoria,
imagenes:c.imagenes
})
.select()
.single();

if(error){
alert("Error");
return;
}

c.id=data.id;

}

alert("Guardado");

};

/* BORRAR */

async function borrar(id){

if(!confirm("¿Borrar camiseta?")) return;

await supabase.from("camisetas").delete().eq("id",id);

catalogo=catalogo.filter(c=>c.id!==id);
render();

}

/* CARGAR */

async function cargar(){
const {data}=await supabase.from("camisetas").select("*");
catalogo=data||[];
render();
}

/* RENDER */

function render(){

const cont=document.getElementById("catalogo");
cont.innerHTML="";

catalogo.forEach(c=>{

if(filtro==="argentina"){
if(!(c.categoria==="seleccion" || c.categoria==="superliga")) return;
}

if(filtro!=="argentina" && filtro!=="todas" && c.categoria!==filtro) return;

const div=document.createElement("div");

div.className="producto";

div.innerHTML=`

<button class="deleteBtn">🗑</button>

<img src="${c.imagenes?.[0]||""}">

<div class="info">
<h3>${c.nombre}</h3>

<a href="https://wa.me/34600000000?text=Hola quiero la camiseta ${encodeURIComponent(c.nombre)}" target="_blank">
<button>Consultar</button>
</a>

</div>
`;

/* BORRAR CLICK */
div.querySelector(".deleteBtn").onclick=(e)=>{
e.stopPropagation();
borrar(c.id);
};

/* ABRIR GALERIA */
div.onclick=()=>{
fotosActuales=c.imagenes;
fotoIndex=0;
mostrarFoto();
document.getElementById("visor").style.display="flex";
};

cont.appendChild(div);

});

}

/* GALERIA FUNCIONES */

function mostrarFoto(){
document.getElementById("visorImg").src=fotosActuales[fotoIndex];
}

document.getElementById("prevBtn").onclick=(e)=>{
e.stopPropagation();
fotoIndex = (fotoIndex - 1 + fotosActuales.length) % fotosActuales.length;
mostrarFoto();
};

document.getElementById("nextBtn").onclick=(e)=>{
e.stopPropagation();
fotoIndex = (fotoIndex + 1) % fotosActuales.length;
mostrarFoto();
};

/* CERRAR */

document.getElementById("visor").onclick=()=>{
document.getElementById("visor").style.display="none";
};

/* INICIO */

cargar();

});

</script>

</body>
</html>
