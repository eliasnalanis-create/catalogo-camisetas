<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL PIBE DE LAS CAMISETAS</title>

<style>

body{
  font-family:Arial;
  margin:0;
  background:#eef3f8;
}

/* HEADER */

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

header img{
  height:60px;
}

/* BOTON ADMIN */

.adminBtn{
  background:#222;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

/* FILTROS */

.filtros{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.filtros button{
  border:none;
  padding:8px 14px;
  border-radius:20px;
  background:#ddd;
  cursor:pointer;
}

.filtros button.activo{
  background:black;
  color:white;
}

/* BUSCADOR */

.buscador{
  padding:10px;
  display:flex;
  justify-content:center;
}

.buscador input{
  width:300px;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

/* CATALOGO */

.catalogo{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.producto{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;
  position:relative;
}

.producto img{
  width:100%;
  height:230px;
  object-fit:cover;
}

.info{
  padding:10px;
  text-align:center;
}

/* BORRAR */

.deleteBtn{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
  padding:5px;
  display:none;
}

.admin .deleteBtn{
  display:block;
}

/* PANEL ADMIN */

.panelAdmin{
  display:none;
  padding:20px;
  background:white;
  text-align:center;
}

.panelAdmin input{
  padding:8px;
  margin:5px;
}

.panelAdmin button{
  padding:10px;
  margin-top:10px;
}

/* VISOR */

#visor{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}

#visor img{
  max-width:90%;
  max-height:70%;
}

/* BOTONES GALERIA */

.galeriaBtns{
  margin-top:20px;
  display:flex;
  gap:20px;
}

.galeriaBtns button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <img src="logo.png">
  <button class="adminBtn" id="adminBtn">Admin</button>
</header>

<div class="filtros">
  <button class="activo">🇦🇷 Argentina</button>
  <button>Todas</button>
  <button>Selección Argentina</button>
  <button>Superliga Argentina</button>
  <button>La Liga</button>
  <button>Premier</button>
</div>

<div class="buscador">
  <input type="text" placeholder="Buscar camiseta">
</div>

<div id="panelAdmin" class="panelAdmin">
  <h3>Subir camiseta</h3>
  <input id="nombre" placeholder="Nombre"><br>
  <input id="categoria" placeholder="Categoría"><br>
  <input type="file" id="imagenes" multiple><br>
  <button id="addBtn">Añadir</button>
</div>

<div id="catalogo" class="catalogo"></div>

<!-- VISOR -->

<div id="visor">

  <img id="visorImg">

  <div class="galeriaBtns">
    <button id="prevBtn">⬅</button>
    <button id="nextBtn">➡</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
  "https://ycrphtitbjvtkhbartec.supabase.co",
  "sb_publishable_dCPb6B5vx6ev5i9odbOVCA_aMw5nAi8"
);

let catalogo = [];
let admin = false;

let fotosActuales = [];
let fotoIndex = 0;

/* ADMIN */

document.getElementById("adminBtn").onclick = () => {

  const pass = prompt("Contraseña admin:");

  if(pass !== "1234") return;

  admin = !admin;
  document.body.classList.toggle("admin");

  document.getElementById("panelAdmin").style.display =
    admin ? "block" : "none";
};

/* AÑADIR */

document.getElementById("addBtn").onclick = () => {

  const nombre = document.getElementById("nombre").value;
  const categoria = document.getElementById("categoria").value;
  const files = [...document.getElementById("imagenes").files];

  if(!nombre || !categoria || files.length === 0){
    alert("Completa todo");
    return;
  }

  const nueva = { nombre, categoria, imagenes: [] };

  let cargadas = 0;

  files.forEach(file => {

    const reader = new FileReader();

    reader.onload = e => {

      nueva.imagenes.push(e.target.result);
      cargadas++;

      if(cargadas === files.length){
        guardar(nueva);
      }

    };

    reader.readAsDataURL(file);

  });

};

/* GUARDAR */

async function guardar(c){

  const { data } = await supabase
    .from("camisetas")
    .insert(c)
    .select()
    .single();

  catalogo.push(data);
  render();

}

/* BORRAR */

async function borrar(id){

  await supabase
    .from("camisetas")
    .delete()
    .eq("id", id);

  catalogo = catalogo.filter(c => c.id !== id);
  render();

}

/* CARGAR */

async function cargar(){

  const { data } = await supabase
    .from("camisetas")
    .select("*");

  catalogo = data || [];
  render();

}

/* RENDER */

function render(){

  const cont = document.getElementById("catalogo");
  cont.innerHTML = "";

  catalogo.forEach(c => {

    const div = document.createElement("div");
    div.className = "producto";

    div.innerHTML = `
      <button class="deleteBtn">🗑</button>
      <img src="${c.imagenes?.[0] || ""}">
      <div class="info">
        <b>${c.nombre}</b>
        <p>${c.categoria}</p>
      </div>
    `;

    /* BORRAR FIX */
    div.querySelector(".deleteBtn").onclick = (e) => {
      e.stopPropagation();
      borrar(c.id);
    };

    div.onclick = () => abrirGaleria(c.imagenes);

    cont.appendChild(div);

  });

}

/* GALERIA */

function abrirGaleria(imgs){

  fotosActuales = imgs;
  fotoIndex = 0;

  mostrarFoto();

  document.getElementById("visor").style.display = "flex";
}

function mostrarFoto(){
  document.getElementById("visorImg").src = fotosActuales[fotoIndex];
}

/* BOTONES */

document.getElementById("prevBtn").onclick = (e) => {
  e.stopPropagation();
  fotoIndex = (fotoIndex - 1 + fotosActuales.length) % fotosActuales.length;
  mostrarFoto();
};

document.getElementById("nextBtn").onclick = (e) => {
  e.stopPropagation();
  fotoIndex = (fotoIndex + 1) % fotosActuales.length;
  mostrarFoto();
};

/* CERRAR */

document.getElementById("visor").onclick = () => {
  document.getElementById("visor").style.display = "none";
};

/* INICIO */

cargar();

</script>

</body>
</html>
