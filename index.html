<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL PIBE DE LAS CAMISETAS</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fa;
}

/* HEADER */

header{
background:white;
padding:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

/* LOGO */

header img{
height:60px;
}

/* MENU */

.menu{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:white;
}

.menu button{
padding:8px 12px;
border:none;
border-radius:20px;
background:#eee;
cursor:pointer;
}

.menu .active{
background:black;
color:white;
}

/* ADMIN */

.adminBtn{
display:none;
margin-top:10px;
}

.adminVisible .adminBtn{
display:inline-block;
}

/* PANEL ADMIN */

.panelAdmin{
display:none;
background:white;
padding:20px;
margin:20px;
border-radius:10px;
text-align:center;
}

/* GRID */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:white;
border-radius:10px;
overflow:hidden;
position:relative;
cursor:pointer;
}

.producto img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:10px;
text-align:center;
}

/* BORRAR */

.deleteBtn{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
border:none;
border-radius:6px;
padding:5px;
display:none;
}

.adminVisible .deleteBtn{
display:block;
}

/* VISOR */

#visor{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

#visor img{
max-width:90%;
max-height:80%;
}

.nav{
color:white;
font-size:30px;
cursor:pointer;
margin:10px;
}

</style>
</head>

<body>

<header>
<img src="logo.png">
<button id="adminBtn" class="adminBtn">Admin</button>
</header>

<div class="menu">
<button data-cat="home" class="active">🏠 Home</button>
<button data-cat="argentina">🇦🇷 Argentina</button>
<button data-cat="seleccion">Selección</button>
<button data-cat="superliga">Superliga</button>
<button data-cat="laliga">La Liga</button>
</div>

<div id="panelAdmin" class="panelAdmin">

<h3>Subir camiseta</h3>

<input id="nombre" placeholder="Nombre"><br><br>

<select id="categoria">
<option value="seleccion">Selección Argentina</option>
<option value="superliga">Superliga Argentina</option>
<option value="laliga">La Liga</option>
</select><br><br>

<label><input type="checkbox" id="novedad"> Novedad</label><br><br>

<input type="file" id="imagenes" multiple><br><br>

<button id="addBtn">Añadir</button>
<button id="guardarBtn">Guardar</button>

</div>

<div id="catalogo" class="catalogo"></div>

<div id="visor">
<span class="nav" id="prev">⬅</span>
<img id="visorImg">
<span class="nav" id="next">➡</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const PASSWORD="1234";

const supabase=window.supabase.createClient(
"https://ycrphtitbjvtkhbartec.supabase.co",
"sb_publishable_dCPb6B5vx6ev5i9odbOVCA_aMw5nAi8"
);

let catalogo=[];
let filtro="home";
let imgs=[];
let index=0;

/* ADMIN LOGIN */
document.addEventListener("keydown",(e)=>{
if(e.ctrlKey && e.shiftKey && e.key==="A"){
if(prompt("Password:")===PASSWORD){
document.body.classList.add("adminVisible");
}
}
});

/* PANEL ADMIN */
document.getElementById("adminBtn").onclick=()=>{
const panel=document.getElementById("panelAdmin");
panel.style.display=panel.style.display==="block"?"none":"block";
};

/* MENU */
document.querySelectorAll(".menu button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
filtro=btn.dataset.cat;
render();
};
});

/* ADD */
document.getElementById("addBtn").onclick=()=>{

const nombre=document.getElementById("nombre").value;
const categoria=document.getElementById("categoria").value;
const novedad=document.getElementById("novedad").checked;
const files=[...document.getElementById("imagenes").files];

if(!nombre||files.length===0){
alert("Faltan datos");
return;
}

const nueva={nombre,categoria,novedad,imagenes:[]};
catalogo.push(nueva);

files.forEach(file=>{
const reader=new FileReader();
reader.onload=e=>{
nueva.imagenes.push(e.target.result);
render();
};
reader.readAsDataURL(file);
});

};

/* SAVE */
document.getElementById("guardarBtn").onclick=async()=>{
for(const c of catalogo){
if(c.id) continue;

const {data,error}=await supabase.from("camisetas")
.insert(c)
.select().single();

if(error){
console.log(error);
alert("Error");
return;
}

c.id=data.id;
}
alert("Guardado");
};

/* DELETE */
async function borrar(c){
if(c.id){
await supabase.from("camisetas").delete().eq("id",c.id);
}
catalogo=catalogo.filter(x=>x!==c);
render();
}

/* LOAD */
async function cargar(){
const {data}=await supabase.from("camisetas").select("*");
catalogo=data||[];
render();
}

/* RENDER */
function render(){

const cont=document.getElementById("catalogo");
cont.innerHTML="";

catalogo.forEach(c=>{

if(filtro==="home"){
if(!c.novedad && c.categoria!=="seleccion" && c.categoria!=="superliga") return;
}

if(filtro==="argentina"){
if(!(c.categoria==="seleccion"||c.categoria==="superliga")) return;
}

if(filtro!=="home" && filtro!=="argentina" && c.categoria!==filtro) return;

const div=document.createElement("div");
div.className="producto";

div.innerHTML=`
<button class="deleteBtn">🗑</button>
<img src="${c.imagenes?.[0]||""}">
<div class="info">
<h3>${c.nombre}</h3>
</div>
`;

div.querySelector(".deleteBtn").onclick=(e)=>{
e.stopPropagation();
borrar(c);
};

div.onclick=()=>{
imgs=c.imagenes;
index=0;
mostrar();
document.getElementById("visor").style.display="flex";
};

cont.appendChild(div);

});

}

/* VISOR */
function mostrar(){
document.getElementById("visorImg").src=imgs[index];
}

document.getElementById("prev").onclick=(e)=>{
e.stopPropagation();
index=(index-1+imgs.length)%imgs.length;
mostrar();
};

document.getElementById("next").onclick=(e)=>{
e.stopPropagation();
index=(index+1)%imgs.length;
mostrar();
};

document.getElementById("visor").onclick=()=>{
document.getElementById("visor").style.display="none";
};

/* INIT */
cargar();

});

</script>

</body>
</html>
