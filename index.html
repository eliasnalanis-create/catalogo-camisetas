<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL PIBE DE LAS CAMISETAS</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f7fa;
}

/* HEADER */

header{
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 25px;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo img{
height:50px;
}

/* BUSCADOR */

.buscador{
flex:1;
display:flex;
justify-content:center;
}

.buscador input{
width:60%;
max-width:420px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
background:#f9f9f9;
}

.acciones{
display:flex;
gap:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* BOTONES */

#guardarBtn{
background:#e0e0e0;
}

.adminBtn{
background:#111;
color:white;
}

/* 🔒 ADMIN OCULTO */
.adminBtn{
display:none;
}

.adminVisible .adminBtn{
display:block;
}

/* PANEL ADMIN */

.panelAdmin{
display:none;
text-align:center;
padding:25px;
background:white;
margin:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* CATÁLOGO */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:25px;
padding:25px;
}

/* PRODUCTO */

.producto{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,.08);
cursor:pointer;
position:relative;
transition:0.25s;
}

.producto:hover{
transform:translateY(-6px);
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.producto img{
width:100%;
height:260px;
object-fit:cover;
}

/* INFO */

.info{
text-align:center;
padding:15px;
}

.info h3{
margin:5px 0;
}

.info p{
color:#666;
margin:0;
}

/* BORRAR */

.deleteBtn{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
font-size:12px;
display:none;
padding:5px 8px;
border-radius:6px;
}

.admin .deleteBtn{
display:block;
}

/* VISOR */

body.modoGaleria header{
display:none;
}

#visor{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#visor img{
max-width:90%;
max-height:85%;
border-radius:12px;
}

.galeriaBtns{
margin-top:25px;
display:flex;
gap:20px;
}

.galeriaBtns button{
background:white;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
</div>

<div class="buscador">
<input type="text" placeholder="🔎 Buscar camiseta">
</div>

<div class="acciones">
<button id="guardarBtn">Guardar</button>
<button class="adminBtn" id="adminBtn">Admin</button>
</div>

</header>

<div id="panelAdmin" class="panelAdmin">

<h3>Subir camiseta</h3>

<input id="nombre" placeholder="Nombre camiseta"><br><br>

<input id="categoria" placeholder="Equipo"><br><br>

<input type="file" id="imagenes" multiple><br><br>

<button id="addBtn">Añadir</button>

</div>

<div id="catalogo" class="catalogo"></div>

<div id="visor">
<img id="visorImg">

<div class="galeriaBtns">
<button id="prevBtn">⬅</button>
<button id="nextBtn">➡</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const PASSWORD="1234"; // CAMBIA ESTO

const supabaseUrl="https://ycrphtitbjvtkhbartec.supabase.co";
const supabaseKey="sb_publishable_dCPb6B5vx6ev5i9odbOVCA_aMw5nAi8";

const supabase=window.supabase.createClient(supabaseUrl,supabaseKey);

let catalogo=[];
let admin=false;

let fotosActuales=[];
let fotoIndex=0;

/* LOGIN ADMIN */

document.addEventListener("keydown",(e)=>{

if(e.key==="a"){

const pass=prompt("Contraseña admin:");

if(pass===PASSWORD){

document.body.classList.add("adminVisible");
alert("Admin desbloqueado 🔓");

}else{
alert("Incorrecto ❌");
}

}

});

/* ACTIVAR PANEL */

document.getElementById("adminBtn").onclick=()=>{

admin=!admin;

document.body.classList.toggle("admin");

document.getElementById("panelAdmin").style.display=admin?"block":"none";

};

/* AÑADIR */

document.getElementById("addBtn").onclick=()=>{

const nombre=document.getElementById("nombre").value;
const categoria=document.getElementById("categoria").value;
const files=[...document.getElementById("imagenes").files];

if(!nombre||!categoria||files.length===0){
alert("Faltan datos");
return;
}

const nueva={nombre,categoria,imagenes:[]};

catalogo.push(nueva);

let cargadas=0;

files.forEach(file=>{
const reader=new FileReader();

reader.onload=e=>{
nueva.imagenes.push(e.target.result);
cargadas++;

if(cargadas===files.length)render();
};

reader.readAsDataURL(file);

});

};

/* GUARDAR */

document.getElementById("guardarBtn").onclick=async()=>{

for(const c of catalogo){

if(c.id) continue;

const{data,error}=await supabase
.from("camisetas")
.insert({
nombre:c.nombre,
categoria:c.categoria,
imagenes:c.imagenes
})
.select()
.single();

if(error){
alert("Error");
return;
}

c.id=data.id;
}

alert("Guardado ✅");

};

/* BORRAR */

async function borrar(id){

if(!confirm("¿Borrar?"))return;

await supabase.from("camisetas").delete().eq("id",id);

catalogo=catalogo.filter(c=>c.id!==id);

render();

}

/* CARGAR */

async function cargar(){

const{data}=await supabase.from("camisetas").select("*");

catalogo=data||[];

render();

}

/* RENDER */

function render(){

const cont=document.getElementById("catalogo");

cont.innerHTML="";

catalogo.forEach(c=>{

const div=document.createElement("div");
div.className="producto";

div.innerHTML=`
<button class="deleteBtn">🗑</button>
<img src="${c.imagenes?.[0]||""}">
<div class="info">
<h3>${c.nombre}</h3>
<p>${c.categoria}</p>
</div>
`;

div.querySelector(".deleteBtn").onclick=(e)=>{
e.stopPropagation();
borrar(c.id);
};

div.onclick=()=>abrirGaleria(c.imagenes);

cont.appendChild(div);

});

}

/* GALERIA */

function abrirGaleria(imgs){

fotosActuales=imgs;
fotoIndex=0;

mostrarFoto();

document.body.classList.add("modoGaleria");
document.getElementById("visor").style.display="flex";

}

function mostrarFoto(){
document.getElementById("visorImg").src=fotosActuales[fotoIndex];
}

/* BOTONES */

document.getElementById("prevBtn").onclick=(e)=>{
e.stopPropagation();
fotoIndex--;
if(fotoIndex<0)fotoIndex=fotosActuales.length-1;
mostrarFoto();
};

document.getElementById("nextBtn").onclick=(e)=>{
e.stopPropagation();
fotoIndex++;
if(fotoIndex>=fotosActuales.length)fotoIndex=0;
mostrarFoto();
};

/* CERRAR */

document.getElementById("visor").onclick=()=>{
document.getElementById("visor").style.display="none";
document.body.classList.remove("modoGaleria");
};

/* INICIO */

cargar();

});

</script>

</body>
</html>
