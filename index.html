<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL PIBE DE LAS CAMISETAS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fa;
}

/* HEADER */

header{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo img{
height:45px;
}

.adminBtn{
display:none;
}

.adminVisible .adminBtn{
display:block;
}

/* MENU */

.menu{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:white;
}

.menu button{
flex:none;
padding:8px 12px;
border:none;
border-radius:20px;
background:#eee;
cursor:pointer;
}

.menu .active{
background:black;
color:white;
}

/* BUSCADOR */

.buscador{
padding:10px;
background:white;
}

.buscador input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* ADMIN */

.panelAdmin{
display:none;
background:white;
margin:15px;
padding:20px;
border-radius:10px;
}

/* GRID */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.producto{
background:white;
border-radius:10px;
overflow:hidden;
position:relative;
}

.producto img{
width:100%;
height:200px;
object-fit:cover;
}

.deleteBtn{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
display:none;
}

.adminVisible .deleteBtn{
display:block;
}

.info{
padding:10px;
text-align:center;
}

.whatsapp{
background:#25D366;
color:white;
border:none;
padding:8px;
border-radius:8px;
margin-top:5px;
width:100%;
}

/* VISOR */

#visor{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
}

#visor img{
max-width:90%;
max-height:80%;
}

.nav{
position:absolute;
top:50%;
font-size:40px;
color:white;
cursor:pointer;
user-select:none;
}

.prev{left:20px;}
.next{right:20px;}

</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>

<button id="adminBtn" class="adminBtn">Admin</button>
</header>

<div class="menu">
<button data-cat="home" class="active">🏠 Home</button>
<button data-cat="argentina">🇦🇷 Argentina</button>
<button data-cat="seleccion">Selección</button>
<button data-cat="superliga">Superliga</button>
<button data-cat="laliga">La Liga</button>
<button data-cat="premier">Premier</button>
<button data-cat="seriea">Serie A</button>
</div>

<div class="buscador">
<input id="buscador" placeholder="Buscar camiseta">
</div>

<div id="panelAdmin" class="panelAdmin">

<h3>Subir camiseta</h3>

<input id="nombreInput" placeholder="Nombre"><br><br>

<select id="categoriaInput">
<option value="seleccion">Selección Argentina</option>
<option value="superliga">Superliga Argentina</option>
<option value="laliga">La Liga</option>
<option value="premier">Premier</option>
<option value="seriea">Serie A</option>
</select><br><br>

<label><input type="checkbox" id="novedad"> Novedad</label><br><br>

<input type="file" id="imagenesInput" multiple><br><br>

<button id="addBtn">Añadir</button>
<button id="guardarBtn">Guardar</button>

</div>

<div id="catalogo" class="catalogo"></div>

<div id="visor">
<span class="nav prev">❮</span>
<img id="visorImg">
<span class="nav next">❯</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const PASSWORD="1234";

const supabase=window.supabase.createClient(
"https://ycrphtitbjvtkhbartec.supabase.co",
"sb_publishable_dCPb6B5vx6ev5i9odbOVCA_aMw5nAi8"
);

let catalogo=[];
let filtro="home";
let currentImgs=[];
let currentIndex=0;

/* LOGIN */
document.addEventListener("keydown",(e)=>{
if(e.ctrlKey && e.shiftKey && e.key==="A"){
if(prompt("Password:")===PASSWORD){
document.body.classList.add("adminVisible");
}
}
});

/* ADMIN PANEL */
adminBtn.onclick=()=>{
panelAdmin.style.display = panelAdmin.style.display==="block" ? "none" : "block";
};

/* MENU */
document.querySelectorAll(".menu button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
filtro=btn.dataset.cat;
render();
};
});

/* ADD */
addBtn.onclick=()=>{

const nombre=document.getElementById("nombreInput").value;
const categoria=document.getElementById("categoriaInput").value;
const novedad=document.getElementById("novedad").checked;
const files=[...document.getElementById("imagenesInput").files];

if(!nombre || files.length===0){
alert("Faltan datos");
return;
}

const nueva={nombre,categoria,novedad,imagenes:[]};
catalogo.push(nueva);

files.forEach(file=>{
const reader=new FileReader();
reader.onload=e=>{
nueva.imagenes.push(e.target.result);
render();
};
reader.readAsDataURL(file);
});
};

/* SAVE */
guardarBtn.onclick=async()=>{
for(const c of catalogo){
if(c.id) continue;

const {data,error}=await supabase.from("camisetas")
.insert(c)
.select().single();

if(error){
console.log(error);
alert("Error al guardar");
return;
}

c.id=data.id;
}
alert("Guardado");
};

/* DELETE */
async function borrar(c){
if(c.id){
await supabase.from("camisetas").delete().eq("id",c.id);
}
catalogo=catalogo.filter(x=>x!==c);
render();
}

/* LOAD */
async function cargar(){
const {data,error}=await supabase.from("camisetas").select("*");
if(error) console.log(error);
catalogo=data||[];
render();
}

/* RENDER */
function render(){

catalogo.sort((a,b)=>(b.novedad?1:0)-(a.novedad?1:0));

catalogoEl.innerHTML="";

catalogo.forEach(c=>{

if(!c.imagenes || c.imagenes.length===0) return;

if(filtro==="home"){
if(!c.novedad && c.categoria!=="seleccion" && c.categoria!=="superliga") return;
}

if(filtro==="argentina"){
if(!(c.categoria==="seleccion"||c.categoria==="superliga")) return;
}

if(filtro!=="home" && filtro!=="argentina" && c.categoria!==filtro) return;

const div=document.createElement("div");
div.className="producto";

div.innerHTML=`
<button class="deleteBtn">🗑</button>
<img src="${c.imagenes[0]}">
<div class="info">
<b>${c.nombre}</b>
<button class="whatsapp">Consultar</button>
</div>
`;

div.querySelector("img").onclick=()=>abrir(c.imagenes);

div.querySelector(".deleteBtn").onclick=(e)=>{
e.stopPropagation();
borrar(c);
};

div.querySelector(".whatsapp").onclick=()=>{
window.open(`https://wa.me/34600000000?text=Hola quiero ${c.nombre}`);
};

catalogoEl.appendChild(div);

});

}

/* VISOR */
function abrir(imgs){
if(!imgs || imgs.length===0) return;

currentImgs=imgs;
currentIndex=0;

document.getElementById("visor").style.display="flex";
mostrar();
}

function mostrar(){
document.getElementById("visorImg").src=currentImgs[currentIndex];
}

document.querySelector(".next").onclick=(e)=>{
e.stopPropagation();
if(currentImgs.length<=1) return;
currentIndex=(currentIndex+1)%currentImgs.length;
mostrar();
};

document.querySelector(".prev").onclick=(e)=>{
e.stopPropagation();
if(currentImgs.length<=1) return;
currentIndex=(currentIndex-1+currentImgs.length)%currentImgs.length;
mostrar();
};

visor.onclick=(e)=>{
if(e.target.id==="visor"){
visor.style.display="none";
}
};

/* INIT */
const catalogoEl=document.getElementById("catalogo");
cargar();

</script>

</body>
</html>
