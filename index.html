<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL PIBE DE LAS CAMISETAS</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f7fa;
}

header{
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 25px;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 10px rgba(0,0,0,.08);
flex-wrap:wrap;
}

.logo img{
height:50px;
}

/* MENÚ */

.menu{
width:100%;
display:flex;
gap:10px;
justify-content:center;
margin-top:10px;
flex-wrap:wrap;
}

.menu button{
background:#eee;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

.menu button.active{
background:#111;
color:white;
}

/* BUSCADOR */

.buscador{
width:100%;
display:flex;
justify-content:center;
margin-top:10px;
}

.buscador input{
width:60%;
max-width:400px;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* ADMIN */

.adminBtn{
display:none;
}

.adminVisible .adminBtn{
display:block;
}

/* CATÁLOGO */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,.08);
cursor:pointer;
position:relative;
transition:0.2s;
}

.producto:hover{
transform:translateY(-5px);
}

.producto img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
text-align:center;
padding:10px;
}

.deleteBtn{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
display:none;
}

.admin .deleteBtn{
display:block;
}

/* VISOR */

#visor{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#visor img{
max-width:90%;
max-height:80%;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
</div>

<!-- MENÚ -->
<div class="menu">
<button data-cat="argentina" class="active">🇦🇷 Argentina</button>
<button data-cat="todas">Todas</button>
<button data-cat="seleccion">Selección Argentina</button>
<button data-cat="superliga">Superliga Argentina</button>
<button data-cat="laliga">La Liga</button>
<button data-cat="premier">Premier</button>
<button data-cat="seriea">Serie A</button>
<button data-cat="champions">Champions</button>
</div>

<div class="buscador">
<input type="text" id="buscador" placeholder="Buscar camiseta">
</div>

<button class="adminBtn" id="adminBtn">Admin</button>

</header>

<div id="panelAdmin" style="display:none;text-align:center;padding:20px;">
<input id="nombre" placeholder="Nombre"><br><br>
<input id="categoria" placeholder="Categoria"><br><br>
<input type="file" id="imagenes" multiple><br><br>
<button id="addBtn">Añadir</button>
<button id="guardarBtn">Guardar</button>
</div>

<div id="catalogo" class="catalogo"></div>

<div id="visor">
<img id="visorImg">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const PASSWORD="1234";

const supabase=window.supabase.createClient(
"https://ycrphtitbjvtkhbartec.supabase.co",
"sb_publishable_dCPb6B5vx6ev5i9odbOVCA_aMw5nAi8"
);

let catalogo=[];
let filtro="argentina";

/* LOGIN ADMIN */

document.addEventListener("keydown",(e)=>{
if(e.ctrlKey && e.shiftKey && e.key==="A"){
const pass=prompt("Password:");
if(pass===PASSWORD){
document.body.classList.add("adminVisible");
}
}
});

/* MENÚ */

document.querySelectorAll(".menu button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
filtro=btn.dataset.cat;
render();
};
});

/* RENDER */

function render(){

const cont=document.getElementById("catalogo");
cont.innerHTML="";

catalogo.forEach(c=>{

if(filtro==="argentina"){
if(!(c.categoria==="seleccion" || c.categoria==="superliga")) return;
}

if(filtro!=="argentina" && filtro!=="todas" && c.categoria!==filtro) return;

const div=document.createElement("div");
div.className="producto";

div.innerHTML=`
<img src="${c.imagenes?.[0]||""}">
<div class="info">
<h3>${c.nombre}</h3>

<a href="https://wa.me/34600000000?text=Hola quiero la camiseta ${encodeURIComponent(c.nombre)}" target="_blank">
<button>Consultar</button>
</a>

</div>
`;

div.onclick=()=>abrir(c.imagenes);

cont.appendChild(div);

});

}

/* GALERIA */

function abrir(imgs){
document.getElementById("visor").style.display="flex";
document.getElementById("visorImg").src=imgs[0];
}

document.getElementById("visor").onclick=()=>{
document.getElementById("visor").style.display="none";
};

/* CARGAR */

async function cargar(){
const {data}=await supabase.from("camisetas").select("*");
catalogo=data||[];
render();
}

cargar();

});

</script>

</body>
</html>
